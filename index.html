<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Especial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            width: 95%;
            max-width: 600px;
            text-align: center;
        }

        h2 { margin-bottom: 25px; font-size: 1.4rem; color: #fff; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-card {
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            background: #2a2a2a;
        }

        .option-card:hover {
            transform: scale(1.03);
            border-color: #50fa7b;
        }

        .option-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
            height: 24px;
        }

        .error { color: #ff5555; }
        .success { color: #50fa7b; }
    </style>
</head>
<body>

<audio id="som-acerto" src="acerto.mp3"></audio>
<audio id="som-erro" src="erro.mp3"></audio>

<div id="quiz-container">
    <h2 id="question-text">Carregando...</h2>
    <div id="options" class="options-grid"></div>
    <p id="message"></p>
</div>

<script>
    const questions = [
        {
            question: "1 - Qual que faz super bem a todos sem nem se dar conta?",
            photos: ["1.3.jpg", "1.jpg", "1.1.jpg", "1.2.jpg"],
            correct: 1 
        },
        {
            question: "2 - Quem tem uma presença que alegra qualquer ambiente?",
            photos: ["2.jpg", "2.1.jpg", "2.2.jpg", "2.3.jpg"],
            correct: 0
        },
        {
            question: "3 - Qual a mulher com o sorriso mais lindo?",
            photos: ["3.3.jpg", "3.2.jpg", "3.jpg", "3.1.jpg"],
            correct: 2
        },
        {
            question: "4 - Quem é a aniversariante mais perfeita do mundo todo?",
            photos: ["4.jpg", "4.1.jpg", "4.3.jpg", "4.2.jpg"],
            correct: 0
        }
    ];

    let currentStep = 0;

    // Referências dos áudios
    const audioAcerto = document.getElementById('som-acerto');
    const audioErro = document.getElementById('som-erro');

    function loadStep() {
        const data = questions[currentStep];
        document.getElementById('question-text').textContent = data.question;
        const container = document.getElementById('options');
        const msg = document.getElementById('message');
        
        container.innerHTML = "";
        msg.textContent = "";

        data.photos.forEach((src, index) => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerHTML = `<img src="${src}" alt="Opção ${index + 1}">`;
            card.onclick = () => validate(index);
            container.appendChild(card);
        });
    }

    function validate(choice) {
        const msg = document.getElementById('message');
        
        if (choice === questions[currentStep].correct) {
            // Tocar som de acerto
            audioAcerto.currentTime = 0; 
            audioAcerto.play().catch(e => console.log("Erro ao tocar áudio:", e));

            msg.className = "success";
            msg.textContent = "Acertou! Próxima...";
            
            currentStep++;
            setTimeout(() => {
                if (currentStep < questions.length) {
                    loadStep();
                } else {
                    window.location.href = "recompensa.html"; 
                }
            }, 1200);
        } else {
            // Tocar som de erro
            audioErro.currentTime = 0;
            audioErro.play().catch(e => console.log("Erro ao tocar áudio:", e));

            msg.className = "error";
            msg.textContent = "Resposta errada, tente novamente!";
        }
    }

    loadStep();
</script>

</body>
</html>
